name: PolyWeather Full Scan (30 min)
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      bankroll_override:
        description: 'Override bankroll ($)'
        required: false
        default: ''
      dry_run_override:
        description: 'Override DRY_RUN (true/false)'
        required: false
        default: ''

jobs:
  full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pw_requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install -r pw_requirements.txt

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: |
            pw_seen_markets.json
            pw_bet_markets.json
            pw_brier_scores.json
            pw_bankroll.json
            pw_bot_state.json
            category_stats.json
            pw_price_history.json
            pw_pending_orders.json
            pw_performance.jsonl
            pw_calibration.json
          key: pw-bot-state-${{ github.run_id }}
          restore-keys: pw-bot-state-

      - name: Restore performance log
        uses: actions/cache@v4
        with:
          path: pw_performance.jsonl
          key: pw-perf-log-
          restore-keys: pw-perf-log-

      - name: Run Full Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLY_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          POLY_FUNDER: ${{ secrets.POLY_FUNDER }}
          CLOB_API_KEY: ${{ secrets.CLOB_API_KEY }}
          CLOB_API_SECRET: ${{ secrets.CLOB_API_SECRET }}
          CLOB_API_PASSPHRASE: ${{ secrets.CLOB_API_PASSPHRASE }}
          BANKROLL: ${{ github.event.inputs.bankroll_override || secrets.BANKROLL || '20' }}
          DRY_RUN: ${{ github.event.inputs.dry_run_override || secrets.DRY_RUN || 'true' }}
          FAST_SCAN: 'false'
        run: python pw_bot_v9_3.py

      - name: Summary
        if: always()
        run: |
          echo "## PolyWeather Bot v9.3 pw_ Full Scan" >> $GITHUB_STEP_SUMMARY
          echo "Completed at: $(date -u +%Y-%m-%dT%H:%MZ)" >> $GITHUB_STEP_SUMMARY
          if [ -f pw_performance.jsonl ]; then
            LINES=$(wc -l < pw_performance.jsonl)
            echo "Performance entries: $LINES" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save performance log
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pw_performance.jsonl
          key: pw-perf-log-${{ github.run_id }}
