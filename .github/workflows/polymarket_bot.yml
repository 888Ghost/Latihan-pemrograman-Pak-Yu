# ═══════════════════════════════════════════════════════════════════════
#  Polymarket Weather Bot v13.1 — Single Unified Workflow
#
#  BUG#11 FIX: FAST_SCAN was 'false' -> bot scanned 800 markets/run
#  BUG#9  FIX: Was 4 conflicting workflows -> now 1
#  BUG#15 FIX: CLOB credentials removed from required secrets
#  BUG#13 FIX: DRY_RUN depth check removed from main.py
#  BUG#10 v13.1 REAL FIX: GitHub Actions cache is eventually-consistent,
#         not atomic. cancel-in-progress=true let a cancelled run's
#         cache-save race against the next run's cache-restore, risking
#         silent state loss (cooldown list, brier scores, bankroll).
#         Fix: (a) queue mode instead of cancel (no mid-write kills),
#              (b) critical state moved to GIT COMMITS, not Actions
#                  cache -- git's own push protection serializes writes
#                  far more reliably than cache key prefix-matching.
#         Cache is now used ONLY for pip deps (non-critical, safe to lose).
#
#  REQUIRED SECRETS (minimum 4):
#    POLY_PRIVATE_KEY, POLY_FUNDER, TELEGRAM_TOKEN, TELEGRAM_CHAT_ID
#  OPTIONAL SECRETS:
#    BANKROLL (default $20), DRY_RUN (default true)
#    CLOB_API_KEY, CLOB_API_SECRET, CLOB_API_PASSPHRASE (auto-derived)
# ═══════════════════════════════════════════════════════════════════════

name: Polymarket Weather Bot v13.1

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run_override:
        description: 'Force DRY_RUN (true/false)'
        required: false
        default: 'default'
      fast_scan_override:
        description: 'FAST_SCAN mode (true=new markets only)'
        required: false
        default: 'default'

# v13.1 Bug#10 fix: QUEUE instead of cancel-in-progress.
# Cancelling a mid-write run risked corrupting/losing state on the
# subsequent cache-save step. Queueing guarantees full sequential
# execution -- no run is ever killed mid-write. Runs on this bot
# complete in seconds to ~1min typically, so queue backlog clears fast.
concurrency:
  group: polymarket-weather-bot
  cancel-in-progress: false

jobs:
  scan-and-trade:
    name: Scan + Analyze + Trade
    runs-on: ubuntu-latest
    timeout-minutes: 4

    permissions:
      contents: write

    steps:
      - name: Checkout (full history for reliable git push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache is now ONLY for pip deps -- losing this cache costs
      # ~10-20sec extra install time, nothing more. Safe to be
      # eventually-consistent for this use case.
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-v13-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-v13-

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      # v13.1 Bug#10 fix: state lives in the repo itself (git-tracked),
      # not in GitHub Actions cache. `git pull` here gets the latest
      # committed state from the previous run -- strongly consistent,
      # because queue mode guarantees no two runs commit concurrently.
      - name: Pull latest state
        run: |
          mkdir -p data logs
          git pull origin main --quiet || echo "No prior state commit yet (first run)"

      - name: Run Bot
        env:
          POLY_PRIVATE_KEY:    ${{ secrets.POLY_PRIVATE_KEY }}
          POLY_FUNDER:         ${{ secrets.POLY_FUNDER }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOB_API_KEY:        ${{ secrets.CLOB_API_KEY }}
          CLOB_API_SECRET:     ${{ secrets.CLOB_API_SECRET }}
          CLOB_API_PASSPHRASE: ${{ secrets.CLOB_API_PASSPHRASE }}
          FAST_SCAN: >-
            ${{
              github.event.inputs.fast_scan_override != 'default'
              && github.event.inputs.fast_scan_override
              || 'true'
            }}
          BANKROLL: ${{ secrets.BANKROLL }}
          DRY_RUN: >-
            ${{
              github.event.inputs.dry_run_override != 'default'
              && github.event.inputs.dry_run_override
              || secrets.DRY_RUN
              || 'true'
            }}
        run: |
          echo "[v13.1] $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "FAST_SCAN=$FAST_SCAN  DRY_RUN=$DRY_RUN"
          echo "BANKROLL=${BANKROLL:-(default 20 USD)}"
          python -m src.main

      # v13.1 Bug#10 fix: commit ALL critical state files via git,
      # not just perf logs. git's push protection (non-fast-forward
      # rejection) is the real concurrency guard here -- if it somehow
      # fails despite queue mode, we pull-rebase-retry rather than
      # silently losing data the way cache overwrites silently would.
      - name: Commit state (atomic via git)
        if: always()
        run: |
          git config --global user.email "bot@noreply.github.com"
          git config --global user.name "Polymarket Bot v13.1"
          git add -f data/*.json data/*.jsonl 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "state: $(date -u '+%Y-%m-%dT%H:%M') [skip ci]"
            for i in 1 2 3; do
              if git push origin main; then
                echo "Push OK (attempt $i)"
                break
              else
                echo "Push failed (attempt $i), pulling+rebasing..."
                git pull --rebase origin main --quiet
              fi
            done
          else
            echo "No state changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## v13.1 Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| DRY_RUN | $DRY_RUN |" >> $GITHUB_STEP_SUMMARY
          echo "| FAST_SCAN | $FAST_SCAN |" >> $GITHUB_STEP_SUMMARY
